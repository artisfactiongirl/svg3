<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   width="100%"
   height="100%"
   viewBox="0 0 800 600"
   preserveAspectRatio="none"
   version="1.1"
   id="svg8"
   sodipodi:docname="snippet.svg"
   inkscape:version="1.4.3 (fcd0343856, 2026-01-01)"
   xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
   xmlns:sodipodi="http://sodipodi.sourceforge.net/DTD/sodipodi-0.dtd"
   xmlns="http://www.w3.org/2000/svg"
   xmlns:svg="http://www.w3.org/2000/svg">
  <sodipodi:namedview
     id="namedview8"
     pagecolor="#ffffff"
     bordercolor="#000000"
     borderopacity="0.25"
     inkscape:showpageshadow="2"
     inkscape:pageopacity="0.0"
     inkscape:pagecheckerboard="0"
     inkscape:deskcolor="#d1d1d1"
     inkscape:zoom="2.7191011"
     inkscape:cx="110.88223"
     inkscape:cy="107.20455"
     inkscape:window-width="1320"
     inkscape:window-height="691"
     inkscape:window-x="0"
     inkscape:window-y="0"
     inkscape:window-maximized="1"
     inkscape:current-layer="beneficial" />
  <defs
     id="defs3">
    <!-- Glühen für Neon-Effekt -->
    <filter
       id="neon-glow"
       x="-2.4"
       y="-2.4"
       width="5.8"
       height="5.8">
      <feGaussianBlur
         stdDeviation="4"
         result="blur"
         id="feGaussianBlur1" />
      <feMerge
         id="feMerge2">
        <feMergeNode
           in="blur"
           id="feMergeNode1" />
        <feMergeNode
           in="SourceGraphic"
           id="feMergeNode2" />
      </feMerge>
    </filter>
    <!-- Animationstimeline für unendlichen Hintergrund -->
    <linearGradient
       id="petri-background"
       x1="0%"
       y1="0%"
       x2="100%"
       y2="0%">
      <stop
         offset="0"
         stop-color="#00ff00"
         stop-opacity="0.8"
         id="stop2"
         style="stop-color:#0600ff;stop-opacity:0.80000001;" />
      <stop
         offset="1"
         stop-color="#00cc00"
         stop-opacity="0.8"
         id="stop3"
         style="stop-color:#00f400;stop-opacity:0.80000001;" />
    </linearGradient>
  </defs>
  <!-- Hintergrund mit sich bewegendem Gradient -->
  <!-- Containermatrix für Bakterien und Pathogene -->
  <g
     id="battlefield"
     transform="matrix(0.16205679,0,0,0.13866572,31.45946,76.370448)">
    <!-- Beneficial Bacteria -->
    <g
       id="beneficial">
      <!-- Mehrere zufällige Bakterien -->
      <circle
         cx="100%"
         cy="200%"
         r="2"
         fill="#00ff00"
         filter="url(#neon-glow)"
         id="circle3"
         transform="matrix(35.197776,0,0,35.197776,-2339.1279,-3707.0389)">
        <animate
           attributeName="cx"
           values="10%;20%;10%"
           dur="15s"
           repeatCount="indefinite" />
        <animate
           attributeName="cy"
           values="20%;25%;20%"
           dur="10s"
           repeatCount="indefinite" />
      </circle>
      <circle
         cx="25%"
         cy="30.000002%"
         r="2.5"
         fill="#00ff00"
         filter="url(#neon-glow)"
         id="circle4"
         transform="matrix(30.866058,0,0,30.866058,-5100.451,-4759.5028)"
         style="fill:#000080">
        <animate
           attributeName="cx"
           values="25%;15%;25%"
           dur="1.7s"
           repeatCount="indefinite" />
        <animate
           attributeName="cy"
           values="30%;35%;30%"
           dur="12s"
           repeatCount="indefinite" />
      </circle>
      <circle
         cx="40%"
         cy="10%"
         r="2.2"
         fill="#00ff00"
         filter="url(#neon-glow)"
         id="circle5"
         transform="matrix(37.788516,0,0,37.788516,-11573.979,-2141.1953)"
         style="fill:#ffff00">
        <animate
           attributeName="cx"
           values="40%;50%;40%"
           dur="14s"
           repeatCount="indefinite" />
        <animate
           attributeName="cy"
           values="10%;15%;10%"
           dur="0.3s"
           repeatCount="indefinite" />
      </circle>
      <!-- weitere Bakterien hinzufügen -->
    </g>
    <!-- Harmful Pathogens -->
    <g
       id="pathogens">
      <circle
         cx="70%"
         cy="40%"
         r="3"
         fill="#ff00ff"
         filter="url(#neon-glow)"
         id="circle6"
         transform="matrix(26.648332,0,0,24.938443,-13969.677,-5791.5073)"
         style="fill:#803300">
        <animate
           attributeName="cx"
           values="70%;60%;70%"
           dur="18s"
           repeatCount="indefinite" />
        <animate
           attributeName="cy"
           values="40%;45%;40%"
           dur="16s"
           repeatCount="indefinite" />
      </circle>
      <circle
         cx="80%"
         cy="25%"
         r="2.8"
         fill="#ff00ff"
         filter="url(#neon-glow)"
         id="circle7"
         transform="matrix(25.426983,0,0,25.426983,-15785.335,-3511.9814)"
         style="fill:#d40000">
        <animate
           attributeName="cx"
           values="80%;85%;80%"
           dur="20s"
           repeatCount="indefinite" />
        <animate
           attributeName="cy"
           values="25%;30%;25%"
           dur="19s"
           repeatCount="indefinite" />
      </circle>
      <circle
         cx="65%"
         cy="55%"
         r="3.0999999"
         fill="#ff00ff"
         filter="url(#neon-glow)"
         id="circle8"
         transform="matrix(23.614659,0,0,23.614659,-11557.97,-7532.259)">
        <animate
           attributeName="cx"
           values="65%;60%;65%"
           dur="22s"
           repeatCount="indefinite" />
        <animate
           attributeName="cy"
           values="55%;60%;55%"
           dur="2.1s"
           repeatCount="indefinite" />
      </circle>
    </g>
  </g>
  <!-- Bewegung der Bakterien für unendlichen Effekt -->
  <script
     type="application/ecmascript"
     id="script8"><![CDATA[
  // Kein JavaScript nötig, Animationen erfolgen über SMIL
]]></script>
</svg>
