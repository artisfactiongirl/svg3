<svg width="100%" height="100%" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#000000" />
  
  <circle id="ball" cx="200" cy="300" r="20" fill="#FF5733">
    <animate 
      attributeName="cy" 
      values="300;100;300" 
      dur="1s" 
      repeatCount="indefinite" 
      easing="ease-in-out" />
  </circle>
</svg>

