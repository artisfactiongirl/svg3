<svg width="200" height="200" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <pattern id="braid" patternUnits="userSpaceOnUse" width="20" height="20">
            <circle cx="10" cy="10" r="8" fill="blue">
                <animate attributeName="r" from="8" to="4" dur="0.5s" begin="0s" repeatCount="indefinite" />
            </circle>
        </pattern>
    </defs>
    <rect width="100%" height="100%" fill="url(#braid)" />
</svg>
